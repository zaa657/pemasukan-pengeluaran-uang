<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplikasi Keuangan Sederhana</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Aplikasi Keuangan</h1>
        <p>Catat pemasukan dan pengeluaran uang secara sederhana.</p>
      </div>

      <div class="cards">
        <div class="card income">
          <p>Total Pemasukan</p>
          <h2 id="totalIncome">Rp 0</h2>
        </div>

        <div class="card expense">
          <p>Total Pengeluaran</p>
          <h2 id="totalExpense">Rp 0</h2>
        </div>

        <div class="card balance">
          <p>Saldo Akhir</p>
          <h2 id="balance">Rp 0</h2>
        </div>
      </div>

      <div class="main">
        <div class="panel">
          <h3>Tambah Transaksi</h3>

          <form id="transactionForm">
            <label for="title">Nama Transaksi</label>
            <input
              type="text"
              id="title"
              placeholder="Contoh: Gaji, Jajan, Transport"
              required
            />

            <label for="amount">Jumlah Uang</label>
            <input
              type="number"
              id="amount"
              placeholder="Contoh: 50000"
              min="1"
              required
            />

            <label for="type">Jenis Transaksi</label>
            <select id="type" required>
              <option value="income">Pemasukan</option>
              <option value="expense">Pengeluaran</option>
            </select>

            <label for="category">Kategori</label>
            <input
              type="text"
              id="category"
              placeholder="Contoh: Gaji, Makanan, Sekolah"
              required
            />

            <label for="paymentMethod">Metode Pembayaran</label>
            <select id="paymentMethod" required>
              <option value="">Pilih Metode Pembayaran</option>
              <option value="Dana">Dana</option>
              <option value="Gopay">Gopay</option>
              <option value="OVO">OVO</option>
              <option value="Shopeepay">Shopeepay</option>
              <option value="Qris">Qris</option>
              <option value="Qris">Transfer</option>
              <option value="Qris">Cash</option>
            </select>

            <label for="date">Tanggal</label>
            <input type="date" id="date" required />

            <label for="note">Catatan</label>
            <textarea id="note" placeholder="Opsional"></textarea>

            <button class="btn-primary" type="submit">Simpan Transaksi</button>
          </form>
        </div>

        <div class="panel">
          <div class="top-actions">
            <h3>Riwayat Transaksi</h3>
            <button class="btn-reset" onclick="resetTransactions()">
              Hapus Semua
            </button>
          </div>

          <div class="filter-row">
            <select id="filterType" onchange="renderTransactions()">
              <option value="all">Semua</option>
              <option value="income">Pemasukan</option>
              <option value="expense">Pengeluaran</option>
            </select>

            <input
              type="text"
              id="searchInput"
              placeholder="Cari transaksi"
              oninput="renderTransactions()"
            />
          </div>

          <div style="overflow-x: auto">
            <table>
              <thead>
                <tr>
                  <th>Tanggal</th>
                  <th>Nama</th>
                  <th>Kategori</th>
                  <th>Metode Pembayaran</th>
                  <th>Jenis</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="transactionList"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
